<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Portfolio Companies</title>
</head>
<body>
  <h1>Portfolio Companies</h1>
  <p>
    <a href="/">Home</a> |
    <a href="/funds.html">Funds Table</a>
  </p>

  <label for="fund-filter">Filter by fund:</label>
  <select id="fund-filter">
    <option value="all">All funds</option>
  </select>

  <table border="1" id="companies-table">
    <thead>
      <tr>
        <th>Fund Name</th>
        <th>Company Name</th>
        <th>Country</th>
        <th>Website</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let allCompanies = [];

    function renderTable(companies) {
      const tbody = document.querySelector("#companies-table tbody");
      tbody.innerHTML = "";

      companies.forEach(company => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${company.fund_name || ""}</td>
          <td>${company.company_name || ""}</td>
          <td>${company.country || ""}</td>
          <td>${company.company_website ? `<a href="${company.company_website}" target="_blank">Site</a>` : ""}</td>          
        `;
        tbody.appendChild(row);
      });
    }

    function populateFundFilter(companies) {
      const select = document.getElementById("fund-filter");
      const fundNames = [...new Set(companies.map(company => company.fund_name).filter(Boolean))];
      fundNames.sort();

      fundNames.forEach(fundName => {
        const option = document.createElement("option");
        option.value = fundName;
        option.textContent = fundName;
        select.appendChild(option);
      });
    }

    fetch("https://data.songbae.com/data/v0.1/portfolio_companies.json")
      .then(response => response.json())
      .then(data => {
        allCompanies = data;
        populateFundFilter(allCompanies);

        const params = new URLSearchParams(window.location.search);
        const fundFromUrl = params.get("fund");
        console.log("fundFromUrl:", fundFromUrl);
        console.log("company fund names:", [...new Set(allCompanies.map(company => company.fund_name))]);
        const select = document.getElementById("fund-filter");

        const fundMap = {
  "Acumen Resilient Agriculture Fund (ARAF)": "ARAF",
  "AgDevCo": "AgDevCo",
  "AgriBusiness Capital (ABC)": "ABC Fund",
  "Huruma Fund": "Huruma",
  "Kampani": "Kampani",
  "MCE Empowering Sustainable Agriculture": "MCE"
};

if (fundFromUrl) {
  const mappedFund = fundMap[fundFromUrl] || fundFromUrl;
  select.value = mappedFund;
  renderTable(allCompanies.filter(company => company.fund_name === mappedFund));
} else {
  renderTable(allCompanies);
}

        select.addEventListener("change", function () {
          const selectedFund = this.value;

          if (selectedFund === "all") {
            renderTable(allCompanies);
          } else {
            renderTable(allCompanies.filter(company => company.fund_name === selectedFund));
          }
        });
      })
      .catch(error => {
        document.body.insertAdjacentHTML("beforeend", "<p>Failed to load portfolio companies data.</p>");
        console.error(error);
      });
  </script>
</body>
</html>
