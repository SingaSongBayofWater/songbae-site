<script>
  let allCompanies = [];

  function renderTable(companies) {
    const tbody = document.querySelector("#companies-table tbody");
    tbody.innerHTML = "";

    companies.forEach(company => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${company.fund_name || ""}</td>
        <td>${company.company_name || ""}</td>
      `;
      tbody.appendChild(row);
    });
  }

  function populateFundFilter(companies) {
    const select = document.getElementById("fund-filter");
    const fundNames = [...new Set(companies.map(company => company.fund_name).filter(Boolean))];
    fundNames.sort();

    fundNames.forEach(fundName => {
      const option = document.createElement("option");
      option.value = fundName;
      option.textContent = fundName;
      select.appendChild(option);
    });
  }

  fetch("https://data.songbae.com/data/v0.1/portfolio_companies.json")
    .then(response => response.json())
    .then(data => {
      allCompanies = data;
      populateFundFilter(allCompanies);

      const params = new URLSearchParams(window.location.search);
      const fundFromUrl = params.get("fund");

      const select = document.getElementById("fund-filter");

      if (fundFromUrl) {
        select.value = fundFromUrl;
        const filtered = allCompanies.filter(c => c.fund_name === fundFromUrl);
        renderTable(filtered);
      } else {
        renderTable(allCompanies);
      }

      select.addEventListener("change", function () {
        const selectedFund = this.value;

        if (selectedFund === "all") {
          renderTable(allCompanies);
        } else {
          const filteredCompanies = allCompanies.filter(c => c.fund_name === selectedFund);
          renderTable(filteredCompanies);
        }
      });
    })
    .catch(error => {
      document.body.insertAdjacentHTML("beforeend", "<p>Failed to load portfolio companies data.</p>");
      console.error(error);
    });
</script>
